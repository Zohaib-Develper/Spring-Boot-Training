databaseChangeLog:
  - changeSet:
      id: 2
      author: zohaib
      changes:
        - insert:
            tableName: api_user
            columns:
              - column:
                  name: username
                  value: reporter
              - column:
                  name: password
                  value: "{noop}reporter"
              - column:
                  name: user_roles
                  value: REPORTER
              - column:
                  name: created_by
                  valueComputed: CURRENT_TIMESTAMP
              - column:
                  name: created_at
                  valueComputed: CURRENT_TIMESTAMP

        - insert:
            tableName: api_user
            columns:
              - column:
                  name: username
                  value: editor
              - column:
                  name: password
                  value: "{noop}editor"
              - column:
                  name: user_roles
                  value: EDITOR
              - column:
                  name: created_by
                  valueComputed: CURRENT_TIMESTAMP
              - column:
                  name: created_at
                  valueComputed: CURRENT_TIMESTAMP