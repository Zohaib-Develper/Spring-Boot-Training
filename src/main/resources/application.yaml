spring:
  application:
    name: lecture02
  boot:
    admin:
      context-path: /admin
  security:
    oauth2:
      client:
        provider:
          github:
            user-name-attribute: login
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
              - openid
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
logging:
  level:
    sql: debug
    web: debug
#    liquibase: debug
#    org.springframework.security: debug


management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  tracing:
    export:
      enabled: true
    sampling:
      probability: 1.0
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4317
          transport: gRPC
    metrics:
      export:
        enabled: false
  otlp:
    metrics:
      export:
        enabled: false
initial:
  message: Hello from application.yaml

